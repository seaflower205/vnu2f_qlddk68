<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <!-- Background Globe Grid (faint) -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#64748b" stroke-width="1.2" stroke-opacity="0.25"/>
  <path d="M4,16 H28" fill="none" stroke="#64748b" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="2,2"/>
  <path d="M16,4 V28" fill="none" stroke="#64748b" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="2,2"/>
  <path d="M16,4 C10.5,7.5 10.5,24.5 16,28" fill="none" stroke="#64748b" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="2,2"/>
  <path d="M16,4 C21.5,7.5 21.5,24.5 16,28" fill="none" stroke="#64748b" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="2,2"/>

  <!-- Source Coordinate System (Blue) -->
  <!-- Axis X -->
  <line x1="9" y1="23" x2="16" y2="23" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Axis Y -->
  <line x1="9" y1="23" x2="9" y2="16" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Origin Dot -->
  <circle cx="9" cy="23" r="2.5" fill="#3b82f6"/>
  <!-- Arrow heads for Source axes -->
  <path d="M15,21.5 L17,23 L15,24.5 Z" fill="#3b82f6"/>
  <path d="M7.5,17 L9,15 L10.5,17 Z" fill="#3b82f6"/>

  <!-- Target Coordinate System (Green, Rotated by 15 deg) -->
  <!-- Origin Dot -->
  <circle cx="23" cy="9" r="2.5" fill="#10b981"/>
  <!-- Rotated Axis X (approx 15 deg) -->
  <line x1="23" y1="9" x2="29.7" y2="10.8" stroke="#10b981" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Rotated Axis Y (approx 15 deg) -->
  <line x1="23" y1="9" x2="21.2" y2="2.3" stroke="#10b981" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Arrow heads for Target axes -->
  <path d="M28,9.5 L30.7,11 L28.8,12.5 Z" fill="#10b981"/>
  <path d="M22,3.5 L20.7,1 L19.8,3 Z" fill="#10b981"/>

  <!-- Transformation Path (Amber Arrow) -->
  <path d="M11,20 C13.5,15.5 17.5,13.5 20.5,11.5" fill="none" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Arrowhead pointing to green system -->
  <path d="M17,11 L22,10 L21,15 Z" fill="#f59e0b"/>
</svg>
