<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <!-- Web Browser Window -->
  <rect x="3" y="5" width="26" height="22" rx="2.5" fill="#ffffff" stroke="#475569" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Browser Header Line -->
  <line x1="3" y1="12" x2="29" y2="12" stroke="#475569" stroke-width="1.8"/>
  
  <!-- Window Controls (Red, Yellow, Green dots) -->
  <circle cx="6.5" cy="8.5" r="1.5" fill="#ef4444"/>
  <circle cx="10.5" cy="8.5" r="1.5" fill="#f59e0b"/>
  <circle cx="14.5" cy="8.5" r="1.5" fill="#10b981"/>
  
  <!-- URL/Search Bar Mockup -->
  <rect x="18" y="7" width="8" height="3" rx="1" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>

  <!-- WebGIS Map Content Area (inside browser) -->
  <!-- Neighbor parcels in faint grey -->
  <!-- Left Parcel -->
  <polygon points="5,21 12,18 11,25 5,24" fill="#e8f0fe" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Right Parcel -->
  <polygon points="20,20 27,18 27,24 19,25" fill="#e6f4ea" stroke="#cbd5e1" stroke-width="1"/>
  
  <!-- Active/Selected Land Parcel (Vibrant Yellow/Amber) -->
  <polygon points="12,18 20,20 19,25 11,25" fill="#fef7e0" stroke="#fbbc05" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Mouse Click Cursor (Dark slate with white border) -->
  <path d="M16,19 L21,24 L18.8,24.5 L20.8,28.5 L19.3,29 L17.3,25 L15.5,26.5 Z" fill="#1e293b" stroke="#ffffff" stroke-width="1" stroke-linejoin="round"/>
</svg>